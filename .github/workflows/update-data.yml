name: Update match data

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 min during tournament
  workflow_dispatch:           # manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install scraper dependencies
        run: npm ci
        working-directory: backend

      - name: Run scraper (single pass)
        run: node scraper.js --once
        working-directory: backend

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/matches.json frontend/public/data/standings.json
          git diff --cached --quiet || git commit -m "chore: refresh match and standings data"
          git push
